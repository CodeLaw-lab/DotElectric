name: OpenCode Pipeline

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest
    # ⚠️ WARNING: WPF (net10.0-windows) requires Windows runner. Do NOT change to ubuntu-latest!
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/DotElectric.TemplateEditor.slnx

      - name: Build
        run: dotnet build src/DotElectric.TemplateEditor.slnx --no-restore --configuration Release --warnaserror

      - name: Run tests with coverage
        run: |
          dotnet test src/DotElectric.TemplateEditor.Tests `
            --no-build `
            --configuration Release `
            --collect:"XPlat Code Coverage" `
            --results-directory ./TestResults

      - name: Check coverage gate (≥75%)
        shell: pwsh
        run: |
          $coverageFiles = Get-ChildItem -Path ./TestResults -Recurse -Filter "*.cobertura.xml"
          $totalCoverage = 0
          $fileCount = 0
          foreach ($file in $coverageFiles) {
            [xml]$xml = Get-Content $file.FullName
            $lineRate = [double]$xml.coverage.'line-rate'
            $totalCoverage += $lineRate
            $fileCount++
          }
          $avgCoverage = if ($fileCount -gt 0) { ($totalCoverage / $fileCount) * 100 } else { 0 }
          Write-Host "Average line coverage: $([math]::Round($avgCoverage, 2))%"
          if ($avgCoverage -lt 75) {
            Write-Host "::error::Coverage gate failed: $([math]::Round($avgCoverage, 2))% < 75%"
            exit 1
          }
          Write-Host "::notice::Coverage gate passed: $([math]::Round($avgCoverage, 2))% ≥ 75%"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./TestResults/**/coverage.cobertura.xml
