name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/DotElectric.TemplateEditor.slnx

      - name: Build
        run: dotnet build src/DotElectric.TemplateEditor.slnx --no-restore --configuration Release

      - name: Test with coverage
        run: dotnet test src/DotElectric.TemplateEditor.Tests --no-restore --configuration Release --collect:"XPlat Code Coverage" --results-directory TestResults/

      - name: Check coverage gate (≥75%)
        shell: pwsh
        run: |
          $coverageFile = Get-ChildItem -Path TestResults -Recurse -Filter "*.cobertura.xml" | Select-Object -First 1
          if (-not $coverageFile) {
            Write-Host "❌ Coverage file not found"
            exit 1
          }
          [xml]$xml = Get-Content $coverageFile.FullName
          $lineRate = [double]$xml.coverage.'line-rate'
          $pct = [math]::Round($lineRate * 100, 2)
          Write-Host "📊 Line coverage: $pct%"
          if ($pct -lt 75) {
            Write-Host "❌ Coverage $pct% is below gate 75%"
            exit 1
          }
          Write-Host "✅ Coverage gate passed ($pct% ≥ 75%)"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: TestResults/
